# RSS 新闻源清单 — 被 lab/tools/fetch_news.py 读取
# 分类: central_bank | macro | geopolitics | markets
# 添加/删除源不需要改 fetch_news.py 代码

feeds:
  # ─── 央行与货币当局 ─────────────────────────────────────────
  - category: central_bank
    source: Federal Reserve
    url: https://www.federalreserve.gov/feeds/press_all.xml
  - category: central_bank
    source: Fed FOMC
    url: https://www.federalreserve.gov/feeds/press_monetary.xml
  - category: central_bank
    source: ECB Press
    url: https://www.ecb.europa.eu/rss/press.html
  - category: central_bank
    source: Bank of Japan
    url: https://www.boj.or.jp/en/rss/whatsnew.xml
  - category: central_bank
    source: Bank of England
    url: https://www.bankofengland.co.uk/rss/news
  - category: central_bank
    source: US Treasury
    url: https://home.treasury.gov/rss/press-releases

  # ─── 宏观与市场评论 ─────────────────────────────────────────
  - category: macro
    source: FT Alphaville
    url: https://www.ft.com/alphaville?format=rss
  - category: macro
    source: Reuters Economy
    url: https://www.reutersagency.com/feed/?best-topics=business-finance&post_type=best
  - category: macro
    source: Bloomberg Opinion Economics
    url: https://feeds.bloomberg.com/opinion/economics
  - category: macro
    source: BIS Publications
    url: https://www.bis.org/rss/home.xml
  - category: macro
    source: IMF Blog
    url: https://www.imf.org/en/Blogs/rss

  # ─── 市场 ───────────────────────────────────────────────────
  - category: markets
    source: Reuters Markets
    url: https://feeds.reuters.com/reuters/USMarketsNews
  - category: markets
    source: FT Markets
    url: https://www.ft.com/markets?format=rss
  - category: markets
    source: MarketWatch Top Stories
    url: https://feeds.marketwatch.com/marketwatch/topstories/

  # ─── 地缘政治 ──────────────────────────────────────────────
  - category: geopolitics
    source: Reuters World
    url: https://feeds.reuters.com/Reuters/worldNews
  - category: geopolitics
    source: FT World
    url: https://www.ft.com/world?format=rss
  - category: geopolitics
    source: Council on Foreign Relations
    url: https://www.cfr.org/rss-feeds
  - category: geopolitics
    source: War on the Rocks
    url: https://warontherocks.com/feed/
  - category: geopolitics
    source: The Economist International
    url: https://www.economist.com/international/rss.xml
